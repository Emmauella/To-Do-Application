<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do Application</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>To-Do List</h1>
        <form id="taskForm" class="input-section">
            <label for="taskInput" class="visually-hidden">New task</label>
            <input type="text" id="taskInput" placeholder="Enter a new task" autocomplete="off">
            <button type="submit" id="addBtn">Add Task</button>
        </form>
        <div id="message" class="message"></div>
        <ul id="taskList"></ul>
        <button id="deleteAllBtn" class="delete-all-btn">Delete All</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
